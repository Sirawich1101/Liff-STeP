<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อนุมัติคำขอ — STeP CMU Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#003B71;--navy2:#1A5A9A;--navy3:#EBF3FB;
  --gold:#D4A017;--gold2:#FEF9E7;
  --green:#1A7F45;--green2:#EAFAF1;
  --red:#C0392B;--red2:#FDEDEC;
  --amber:#B9770E;--amber2:#FEF9E7;
  --gray:#6C757D;--border:#DEE2E6;
  --bg:#F5F7FA;--white:#FFFFFF;
  --text:#1A1A2E;--sub:#6C757D;
  --r:12px;--shadow:0 2px 12px rgba(0,59,113,.08);
}
html{font-size:16px}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ─── HEADER ─── */
.hdr{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  padding:20px 18px 36px;position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:20px;
  background:var(--bg);border-radius:20px 20px 0 0;
}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.hdr-badge{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  letter-spacing:.5px;text-transform:uppercase;
}
.hdr h1{color:#fff;font-size:20px;font-weight:800;letter-spacing:-.3px}
.hdr p{color:rgba(255,255,255,.65);font-size:13px;margin-top:2px}

/* ─── BODY ─── */
.body{padding:12px 16px 40px}

/* ─── CARD ─── */
.card{
  background:var(--white);border-radius:var(--r);
  box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;
}
.card-hd{
  background:var(--navy);padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.card-code{color:#fff;font-size:17px;font-weight:800;letter-spacing:.5px}
.card-date{color:rgba(255,255,255,.6);font-size:12px}
.card-bd{padding:14px 16px}
.sec-title{
  font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:12px;padding-bottom:8px;
  border-bottom:2px solid var(--navy3);
}

/* ─── INFO ROWS ─── */
.info-grid{display:grid;grid-template-columns:90px 1fr;gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:0}
.info-cell{background:var(--white);padding:9px 12px;font-size:14px}
.info-cell.key{background:#FAFBFC;color:var(--sub);font-weight:600;font-size:13px}
.info-cell.val{color:var(--text);font-weight:500}
.info-cell.val.full{grid-column:1/-1;background:var(--navy3);color:var(--navy);font-weight:600}

/* ─── STATUS BADGE ─── */
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;
}
.status-pill.pending{background:#FEF9E7;color:var(--amber)}
.status-pill.done{background:var(--green2);color:var(--green)}
.status-pill::before{content:'●';font-size:8px}

/* ─── CHECKLIST ─── */
.checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.check-item{
  display:flex;align-items:center;gap:12px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:10px;padding:12px 14px;cursor:pointer;
  transition:all .15s ease;
}
.check-item:hover{border-color:var(--navy2);background:var(--navy3)}
.check-item.checked{
  border-color:var(--navy);background:var(--navy3);
}
.check-item.checked .check-box{
  background:var(--navy);border-color:var(--navy);
}
.check-item.checked .check-box::after{
  content:'✓';color:#fff;font-size:13px;font-weight:700;
}
.check-box{
  width:24px;height:24px;border-radius:6px;
  border:2px solid var(--border);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.check-label{flex:1}
.check-name{font-size:14px;font-weight:600;color:var(--text)}
.check-file{font-size:12px;color:var(--sub);margin-top:1px}
.check-badge{
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;
}
.check-badge.auto{background:var(--navy3);color:var(--navy)}
.check-badge.manual{background:#F8F9FA;color:var(--sub)}

/* ─── NOTE BOX ─── */
.note{
  background:var(--amber2);border:1px solid #F9E79F;
  border-radius:10px;padding:12px 14px;font-size:13px;
  color:var(--amber);line-height:1.6;margin-bottom:14px;
}
.note strong{font-weight:700}

/* ─── BUTTONS ─── */
.btn-row{display:flex;flex-direction:column;gap:10px}
.btn{
  width:100%;height:52px;border:none;border-radius:10px;
  font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--navy2)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover:not(:disabled){background:#1d9655}
.btn-disabled{background:#E9ECEF;color:var(--sub);cursor:not-allowed}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ─── ALERT ─── */
.alert{border-radius:10px;padding:12px 14px;font-size:14px;margin-top:12px;display:none;line-height:1.5}
.alert.show{display:block}
.alert.info{background:var(--navy3);color:var(--navy2);border:1px solid #B8D4EC}
.alert.success{background:var(--green2);color:var(--green);border:1px solid #A9DFBF}
.alert.error{background:var(--red2);color:var(--red);border:1px solid #F5B7B1}
.alert.warn{background:var(--amber2);color:var(--amber);border:1px solid #F9E79F}

/* ─── LOADING ─── */
#loading{text-align:center;padding:50px 20px;color:var(--sub)}
.loader{
  width:36px;height:36px;border:3px solid var(--navy3);
  border-top-color:var(--navy);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SPINNER ─── */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
}

/* ─── SUCCESS ─── */
.success-screen{
  text-align:center;padding:30px 20px;
  background:var(--green2);border-radius:var(--r);
  border:1px solid #A9DFBF;
}
.success-icon{font-size:48px;margin-bottom:12px}
.success-screen h3{color:var(--green);font-size:20px;font-weight:800;margin-bottom:6px}
.success-screen p{color:var(--sub);font-size:14px}

/* ─── DIVIDER ─── */
.divider{height:1px;background:var(--border);margin:14px 0}

#result{display:none}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <span class="hdr-badge">Admin Panel</span>
  </div>
  <h1>อนุมัติคำขอเอกสาร</h1>
  <p>STeP CMU — Science and Technology Park</p>
</div>

<div class="body">

  <!-- LOADING -->
  <div id="loading">
    <div class="loader"></div>
    <div>กำลังโหลดข้อมูลคำขอ...</div>
  </div>

  <!-- RESULT -->
  <div id="result">

    <!-- CARD 1: สถานะ -->
    <div class="card">
      <div class="card-hd">
        <span class="card-code" id="dCode">—</span>
        <span class="card-date" id="dDate">—</span>
      </div>
      <div class="card-bd">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span class="sec-title" style="margin-bottom:0;border:none">สถานะคำขอ</span>
          <span class="status-pill pending" id="dStatus">รอการอนุมัติ</span>
        </div>
      </div>
    </div>

    <!-- CARD 2: รายละเอียดผู้ขอ -->
    <div class="card">
      <div class="card-bd">
        <div class="sec-title">ข้อมูลผู้ยื่นคำขอ</div>
        <div class="info-grid">
          <div class="info-cell key">ผู้ขอ</div>
          <div class="info-cell val" id="dName">—</div>
          <div class="info-cell key">หน่วยงาน</div>
          <div class="info-cell val" id="dCompany">—</div>
          <div class="info-cell key">โทรศัพท์</div>
          <div class="info-cell val" id="dPhone">—</div>
          <div class="info-cell key">อีเมล</div>
          <div class="info-cell val" id="dEmail">—</div>
          <div class="info-cell key">วันที่ต้องการ</div>
          <div class="info-cell val" id="dDate2">—</div>
          <div class="info-cell key">หมายเหตุ</div>
          <div class="info-cell val" id="dNote">—</div>
        </div>
      </div>
    </div>

    <!-- CARD 3: สถานที่ -->
    <div class="card">
      <div class="card-bd">
        <div class="sec-title">พื้นที่ที่ขอ</div>
        <div class="info-grid">
          <div class="info-cell key">พื้นที่</div>
          <div class="info-cell val" id="dArea">—</div>
          <div class="info-cell key">อาคาร</div>
          <div class="info-cell val" id="dBuilding">—</div>
          <div class="info-cell key">ชั้น</div>
          <div class="info-cell val" id="dFloor">—</div>
          <div class="info-cell key">ห้อง</div>
          <div class="info-cell val" id="dRoom">—</div>
        </div>
      </div>
    </div>

    <!-- CARD 4: ประเภทเอกสารที่ขอ -->
    <div class="card">
      <div class="card-bd">
        <div class="sec-title">ประเภทเอกสารที่ขอ</div>
        <div id="dTypeList" style="font-size:14px;color:var(--text);line-height:1.8">—</div>
      </div>
    </div>

    <!-- CARD 5: เลือกไฟล์ที่จะส่ง -->
    <div class="card">
      <div class="card-bd">
        <div class="sec-title">ไฟล์ที่จะส่งให้ผู้ขอ</div>

        <div class="checklist" id="fileChecklist">
          <!-- สร้างอัตโนมัติจาก JS -->
        </div>

        <div class="divider"></div>

        <div class="btn-row">
          <button class="btn btn-success" id="approveBtn" onclick="doApprove()" disabled>
            อนุมัติและส่งให้ผู้ขอทาง LINE
          </button>
        </div>

        <div id="alertBox" class="alert"></div>

      </div>
    </div>

  </div><!-- /result -->

</div><!-- /body -->

<script>
// ─── CONFIG ───────────────────────────────────
const ADMIN_USER_IDS = ['U863fe878279ef43dba1837ef16148e5d'];

// Map: ชื่อเอกสาร (ที่ user เลือก) → ชื่อไฟล์ใน Drive
const DOC_FILE_MAP = {
  'แบบสถาปัตยกรรม':            { file: 'architectural.pdf',  label: 'แบบสถาปัตยกรรม' },
  'แบบวิศวกรรมโครงสร้าง':      { file: 'structural.pdf',     label: 'แบบวิศวกรรมโครงสร้าง' },
  'แบบระบบไฟฟ้า':              { file: 'electrical.pdf',     label: 'แบบระบบไฟฟ้า' },
  'แบบระบบสุขาภิบาล':          { file: 'plumbing.pdf',       label: 'แบบระบบสุขาภิบาล' },
  'แบบระบบปรับอากาศ':          { file: 'hvac.pdf',           label: 'แบบระบบปรับอากาศ' },
  'แบบแปลนทั่วไป':             { file: 'general.pdf',        label: 'แบบแปลนทั่วไป' },
  'แบบระบบเครื่องกล':          { file: 'hvac.pdf',           label: 'แบบระบบเครื่องกล' },
  'แบบสถาปัตยกรรมพื้นที่ทั่วไป':{ file: 'general.pdf',       label: 'แบบสถาปัตยกรรมพื้นที่ทั่วไป' },
};

// ─── STATE ────────────────────────────────────
let requestData   = null;
let adminUserId   = null;
let checkedFiles  = new Set();

// ─── INIT ─────────────────────────────────────
const params = new URLSearchParams(location.search);
const code   = params.get('code') || '';

window.addEventListener('DOMContentLoaded', init);

async function init() {
  if (!code) {
    showLoading(false);
    showAlert('ไม่พบเลขคำขอใน URL — กรุณาเปิดลิงก์จาก LINE', 'error');
    return;
  }

  // ลอง get LINE profile (ถ้า LIFF พร้อม)
  try {
    if (window.liff) {
      await liff.init({ liffId: '2009976605-TktdEveT' });
      if (liff.isLoggedIn()) {
        const p = await liff.getProfile();
        adminUserId = p.userId;
      }
    }
  } catch(e) { /* ไม่มี LIFF ก็ไม่เป็นไร */ }

  await loadRequest();
}

async function loadRequest() {
  try {
    const res = await fetch('/api/get-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestCode: code })
    });
    const json = await res.json();

    if (!json.found || !json.request) {
      showLoading(false);
      showAlert(`ไม่พบคำขอ "${code}" ในระบบ`, 'error');
      return;
    }

    requestData = json.request;
    renderRequest(requestData);
    showLoading(false);
    document.getElementById('result').style.display = 'block';

  } catch(e) {
    showLoading(false);
    showAlert('เกิดข้อผิดพลาด: ' + e.message, 'error');
  }
}

function renderRequest(r) {
  // Header
  document.getElementById('dCode').textContent  = r.request_code || code;
  document.getElementById('dDate').textContent  = formatDate(r.created_at);

  // Status
  const statusEl = document.getElementById('dStatus');
  const statusMap = {
    'PENDING_ADMIN': 'รอการอนุมัติ',
    'DELIVERED':     'ส่งเอกสารแล้ว',
    'RECEIVED':      'ผู้ขอรับแล้ว',
    'รับคำขอแล้ว':  'รอการอนุมัติ',
  };
  const statusTxt = statusMap[r.status] || r.status || 'รอการอนุมัติ';
  statusEl.textContent = statusTxt;
  if (r.status === 'DELIVERED' || r.status === 'RECEIVED') {
    statusEl.className = 'status-pill done';
  }

  // ข้อมูลผู้ขอ
  document.getElementById('dName').textContent    = r.requester_name || '—';
  document.getElementById('dCompany').textContent = r.company        || '—';
  document.getElementById('dPhone').textContent   = r.phone          || '—';
  document.getElementById('dEmail').textContent   = r.email          || '—';
  document.getElementById('dDate2').textContent   = r.required_date  || '—';
  document.getElementById('dNote').textContent    = r.note || 'ไม่มี';

  // พื้นที่
  document.getElementById('dArea').textContent     = r.area       || '—';
  document.getElementById('dBuilding').textContent = r.building ? `อาคาร ${r.building}` : (r.area || '—');
  document.getElementById('dFloor').textContent    = r.floor ? `ชั้น ${r.floor}` : '—';
  document.getElementById('dRoom').textContent     = r.room_number || r.objective || '—';

  // ประเภทเอกสาร
  const types = (r.document_type || '').split(',').map(s => s.trim()).filter(Boolean);
  document.getElementById('dTypeList').innerHTML = types.map(t =>
    `<div style="padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <span style="color:var(--navy);font-size:16px">📄</span>
      <span>${t}</span>
    </div>`
  ).join('') || '—';

  // สร้าง checklist
  buildChecklist(types);
}

function buildChecklist(requestedTypes) {
  const container = document.getElementById('fileChecklist');
  checkedFiles.clear();

  // หา match จาก DOC_FILE_MAP
  const matched = [];
  const unmatched = [];

  requestedTypes.forEach(type => {
    // หา key ที่ตรงหรือใกล้เคียง
    let found = null;
    for (const [key, val] of Object.entries(DOC_FILE_MAP)) {
      if (type.includes(key) || key.includes(type) || type === key) {
        found = { type, ...val, auto: true };
        break;
      }
    }
    if (found) matched.push(found);
    else unmatched.push({ type, file: '', label: type, auto: false });
  });

  const allItems = [...matched, ...unmatched];

  container.innerHTML = '';
  allItems.forEach(item => {
    const id = `chk_${item.file || item.type}`;

    // auto-check ถ้า match
    if (item.auto) checkedFiles.add(item.file);

    const div = document.createElement('div');
    div.className = `check-item ${item.auto ? 'checked' : ''}`;
    div.setAttribute('data-file', item.file);
    div.setAttribute('data-type', item.type);
    div.innerHTML = `
      <div class="check-box">${item.auto ? '' : ''}</div>
      <div class="check-label">
        <div class="check-name">${item.label}</div>
        <div class="check-file">${item.file ? item.file : 'ไม่พบชื่อไฟล์มาตรฐาน'}</div>
      </div>
      <span class="check-badge ${item.auto ? 'auto' : 'manual'}">${item.auto ? 'อัตโนมัติ' : 'กรอกเอง'}</span>
    `;
    div.addEventListener('click', () => toggleCheck(div, item));
    container.appendChild(div);
  });

  updateApproveBtn();
}

function toggleCheck(div, item) {
  const isChecked = div.classList.contains('checked');
  if (isChecked) {
    div.classList.remove('checked');
    div.querySelector('.check-box').innerHTML = '';
    if (item.file) checkedFiles.delete(item.file);
  } else {
    div.classList.add('checked');
    div.querySelector('.check-box').innerHTML = '';
    if (item.file) checkedFiles.add(item.file);
  }
  updateApproveBtn();
}

function updateApproveBtn() {
  const btn = document.getElementById('approveBtn');
  if (!requestData) { btn.disabled = true; return; }
  if (checkedFiles.size === 0) {
    btn.disabled = true;
    btn.textContent = 'เลือกไฟล์ก่อนอนุมัติ';
    return;
  }
  const canApprove = ['PENDING_ADMIN','รับคำขอแล้ว','FILE_UPLOADED'].includes(requestData.status);
  if (!canApprove) {
    btn.disabled = true;
    btn.textContent = 'คำขอนี้ดำเนินการแล้ว';
    return;
  }
  btn.disabled = false;
  btn.innerHTML = `✅ อนุมัติและส่งให้ผู้ขอทาง LINE (${checkedFiles.size} ไฟล์)`;
}

async function doApprove() {
  if (!requestData || checkedFiles.size === 0) return;

  const btn = document.getElementById('approveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>กำลังส่ง...';
  hideAlert();

  try {
    const payload = {
      requestCode:    requestData.request_code || code,
      lineUserId:     requestData.line_user_id,
      adminUserId:    adminUserId || ADMIN_USER_IDS[0],
      selectedFiles:  Array.from(checkedFiles),
      building:       requestData.building,
      floor:          requestData.floor,
      documentTypes:  (requestData.document_type || '').split(',').map(s=>s.trim()),
    };

    const res = await fetch('/api/admin-approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const json = await res.json().catch(() => ({}));

    if (res.ok && (json.success !== false)) {
      // แสดง success
      document.getElementById('fileChecklist').innerHTML = '';
      document.querySelector('.note').style.display = 'none';
      document.getElementById('approveBtn').style.display = 'none';

      const successHtml = `
        <div class="success-screen">
          <div class="success-icon">✅</div>
          <h3>ส่งเอกสารสำเร็จ!</h3>
          <p>ระบบส่งลิงก์เอกสารให้ผู้ขอทาง LINE แล้ว<br>
          รหัสคำขอ: <strong>${requestData.request_code || code}</strong></p>
        </div>`;
      document.getElementById('fileChecklist').insertAdjacentHTML('beforebegin', successHtml);

      // อัปเดต status badge
      const statusEl = document.getElementById('dStatus');
      statusEl.textContent = 'ส่งเอกสารแล้ว';
      statusEl.className = 'status-pill done';

    } else {
      throw new Error(json.error || json.message || 'เกิดข้อผิดพลาด');
    }

  } catch(e) {
    showAlert('เกิดข้อผิดพลาด: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = `✅ อนุมัติและส่งให้ผู้ขอทาง LINE (${checkedFiles.size} ไฟล์)`;
  }
}

// ─── HELPERS ─────────────────────────────────
function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}

function showAlert(msg, type='info') {
  const el = document.getElementById('alertBox');
  if (!el) {
    // fallback: แสดงใต้ result
    const a = document.createElement('div');
    a.className = `alert ${type} show`;
    a.textContent = msg;
    document.querySelector('.body').appendChild(a);
    return;
  }
  el.textContent = msg;
  el.className = `alert ${type} show`;
}

function hideAlert() {
  const el = document.getElementById('alertBox');
  if (el) el.className = 'alert';
}

function formatDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('th-TH', {
      year: 'numeric', month: 'short', day: 'numeric', timeZone: 'Asia/Bangkok'
    });
  } catch { return iso; }
}
</script>
